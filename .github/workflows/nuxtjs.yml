# Build & deploy the @robotbas/ui component showcase (playground/) to GitHub Pages.
name: Deploy Nuxt site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        # NOTE: intentionally NOT passing `static_site_generator: nuxt`. That
        # option injects the env var NUXT_APP_BASE_URL, which Nitro treats as a
        # RUNTIME base and makes the prerender emit only "Redirecting..." stubs
        # instead of the page. We bake the base at build time via DEPLOY_BASE_URL.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static HTML export with Nuxt
        # `github_pages` preset prerenders to static HTML and adds `.nojekyll`.
        # The project subpath base is baked at build time inside nuxt.config.ts
        # (selected via the GITHUB_ACTIONS env var, which Actions sets to "true").
        # It must be a literal string, NOT passed through NUXT_APP_BASE_URL, or
        # Nitro treats it as a runtime base and the prerender emits redirects.
        env:
          NITRO_PRESET: github_pages
        run: pnpm exec nuxi build playground

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # nuxi generate outputs the static site to <rootDir>/.output/public.
          path: ./playground/.output/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
